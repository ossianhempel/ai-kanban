# Deploy a pre-built image to a Linux VM over SSH.
#
# Copy to: .github/workflows/deploy-vm.yml
#
# Prerequisites on the VM:
#   - Docker + compose plugin
#   - /opt/ai-kanban/docker-compose.yml  (from docs/deploy/examples/docker-compose.pull.yml)
#   - /opt/ai-kanban/.env                  (from docs/deploy/examples/env.production.example)
#   - /opt/ai-kanban/data/                 (persistent volume)
#
# GitHub repository secrets:
#   DEPLOY_HOST      — VM IP or hostname
#   DEPLOY_USER      — SSH user
#   DEPLOY_SSH_KEY   — Private key (full PEM)
#   DEPLOY_PATH      — e.g. /opt/ai-kanban
#   GHCR_USERNAME    — (optional) for private packages
#   GHCR_TOKEN       — (optional) PAT with read:packages

name: Deploy VM

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker compose pull
            docker compose up -d
            docker compose ps
            curl -sf http://127.0.0.1:3000/health
